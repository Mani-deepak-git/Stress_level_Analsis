services:
  # AI Backend (FastAPI + PyTorch LSTM/CNN)
  - type: web
    name: interview-ai-backend
    runtime: python
    rootDir: backend/ai_server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Node.js WebRTC + Socket.IO Server
  - type: web
    name: interview-node-server
    runtime: node
    rootDir: backend/node_server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.0.0
      - key: AI_BACKEND_URL
        value: https://interview-ai-backend-n8vf.onrender.com
      - key: NODE_SERVER_URL
        value: https://interview-node-server.onrender.com
